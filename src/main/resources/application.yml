spring:
  application:
    name: snackdeal-backand

  profiles:
    active: mysql,redis,dev

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

custom:
  front:
    url: ${FRONT_URL:http://localhost:5173}

  jwt:
    secrets:
      app-key: ${JWT_APP_KEY}
    expiration: ${JWT_EXPIRATION:900000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  mail:
    from: ${MAIL_USERNAME}

  email-verification:
    code-expiration: ${EMAIL_CODE_EXPIRATION:300000}
    token-expiration: ${EMAIL_TOKEN_EXPIRATION:1800000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3200,http://localhost:8000}

  # 포트원 V2 결제 연동.
  #  - api-secret: 백엔드 검증용(콘솔 "V2 API Secret")
  #  - store-id / channel-key: 프론트 결제창(requestPayment)용 prepare 응답으로 내려준다(공개값).
  portone:
    api-url: ${PORTONE_API_URL:https://api.portone.io}
    api-secret: ${PORTONE_API_SECRET:}
    store-id: ${PORTONE_STORE_ID:}
    channel-key: ${PORTONE_CHANNEL_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
