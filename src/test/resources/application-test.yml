spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "dummy-id"
            client-secret: "dummy-secret"
            scope: "profile, email"
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

  mail:
    host: localhost
    port: 3025
    username: test@snackdeal.io
    password: dummy

custom:
  jwt:
    secrets:
      app-key: "MDE5ZTgxZmQtZmE0OC03MzU4LTlkYzEtOWI4NTgxYjljZjI1LTAxOWU4MWZkLWZhNDgtN2RkMi1iOTViLWMxY2I5ZmZiYWMxNw=="
    expiration: 6000000
    refresh-expiration: 604800000
  mail:
    from: test@snackdeal.io
  email-verification:
    code-expiration: 300000
    token-expiration: 1800000
  portone:
    api-url: https://api.portone.io
    api-secret: dummy-secret
    store-id: store-test
    channel-key: channel-key-test
